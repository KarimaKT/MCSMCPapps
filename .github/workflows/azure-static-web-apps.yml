name: Build and deploy WebChat UI

# Builds the webchat-ui Vite project and deploys it to Azure Static Web Apps.
# The deployment token is stored in the AZURE_STATIC_WEB_APPS_API_TOKEN secret.

on:
  push:
    branches: [main]
    paths:
      - 'webchat-ui/**'
      - '.github/workflows/azure-static-web-apps.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]
    paths:
      - 'webchat-ui/**'

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          lfs: false

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: webchat-ui/package-lock.json

      - name: Install dependencies
        working-directory: webchat-ui
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        working-directory: webchat-ui
        run: npm run typecheck

      - name: Build and Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: 'webchat-ui'
          output_location: 'dist'
          # Vite handles its own build via npm run build; tell SWA to skip the default build.
          app_build_command: 'npm run build'
        env:
          # Inject Vite-prefixed env vars at build time. These come from
          # repo-level GitHub Actions secrets (configured per environment).
          VITE_CS_SCHEMA_NAME: ${{ secrets.VITE_CS_SCHEMA_NAME }}
          VITE_CS_BOT_ID: ${{ secrets.VITE_CS_BOT_ID }}
          VITE_CS_ENVIRONMENT_ID: ${{ secrets.VITE_CS_ENVIRONMENT_ID }}
          VITE_CS_TOKEN_ENDPOINT: ${{ secrets.VITE_CS_TOKEN_ENDPOINT }}
          VITE_AAD_CLIENT_ID: ${{ secrets.VITE_AAD_CLIENT_ID }}
          VITE_AAD_AUTHORITY: ${{ secrets.VITE_AAD_AUTHORITY }}
          VITE_AAD_SCOPE: ${{ secrets.VITE_AAD_SCOPE }}
          # Branding (all optional). Provide via repo secrets named the
          # same way — missing values fall back to source defaults.
          VITE_BRAND_AGENT_NAME: ${{ secrets.VITE_BRAND_AGENT_NAME }}
          VITE_BRAND_AGENT_SUBTITLE: ${{ secrets.VITE_BRAND_AGENT_SUBTITLE }}
          VITE_BRAND_LOGO: ${{ secrets.VITE_BRAND_LOGO }}
          VITE_BRAND_COMPANY_NAME: ${{ secrets.VITE_BRAND_COMPANY_NAME }}
          VITE_BRAND_ACCENT_COLOR: ${{ secrets.VITE_BRAND_ACCENT_COLOR }}
          VITE_BRAND_ACCENT_FOREGROUND: ${{ secrets.VITE_BRAND_ACCENT_FOREGROUND }}
          VITE_BRAND_FONT_FAMILY: ${{ secrets.VITE_BRAND_FONT_FAMILY }}
          VITE_BRAND_PAGE_TITLE: ${{ secrets.VITE_BRAND_PAGE_TITLE }}

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
