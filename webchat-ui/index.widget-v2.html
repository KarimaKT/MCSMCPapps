<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eurozone Analyst</title>
    <style>
      :root {
        --bg: #ffffff;
        --fg: #1a1a1a;
        --muted: #5b5d62;
        --card-bg: #ffffff;
        --card-border: #e2e3e6;
        --accent: #003399;
        --accent-fg: #ffffff;
        --hover: #f1f3f5;
        --positive: #107c10;
        --negative: #c50f1f;
      }
      :host([data-theme='dark']),
      [data-theme='dark'] {
        --bg: #1f1f1f;
        --fg: #f3f3f3;
        --muted: #a0a0a0;
        --card-bg: #2b2b2b;
        --card-border: #3d3d3d;
        --hover: #333333;
      }
      html, body, #root {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--bg);
        color: var(--fg);
        font-family: 'Segoe UI', system-ui, -apple-system, Roboto, sans-serif;
        font-size: 14px;
        line-height: 1.4;
      }
      .mcs-card {
        margin: 0;
        padding: 16px;
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 8px;
      }
      .mcs-pending { color: var(--muted); padding: 16px; }
      .mcs-error { color: var(--negative); padding: 16px; }
      .mcs-error h4 { margin: 0 0 6px; font-size: 14px; }
      .mcs-error pre {
        margin: 8px 0 0;
        padding: 8px;
        background: var(--hover);
        border: 1px solid var(--card-border);
        border-radius: 4px;
        font-family: ui-monospace, Consolas, monospace;
        font-size: 11px;
        white-space: pre-wrap;
        word-break: break-word;
        max-height: 200px;
        overflow: auto;
        color: var(--fg);
      }
      .mcs-stat {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .mcs-stat-title { font-size: 12px; color: var(--muted); }
      .mcs-stat-value { font-size: 28px; font-weight: 600; line-height: 1.1; }
      .mcs-stat-delta { font-size: 12px; color: var(--muted); }
      .mcs-stat-delta.positive { color: var(--positive); }
      .mcs-stat-delta.negative { color: var(--negative); }
      .mcs-spark { margin-top: 8px; }
      .mcs-compare { display: flex; flex-direction: column; gap: 8px; }
      .mcs-compare-row {
        display: grid;
        grid-template-columns: 1fr 60px;
        gap: 8px;
        align-items: center;
      }
      .mcs-compare-bar {
        height: 6px;
        background: var(--hover);
        border-radius: 3px;
        overflow: hidden;
        position: relative;
      }
      .mcs-compare-bar-fill {
        height: 100%;
        background: var(--accent);
      }
      .mcs-compare-label { font-size: 13px; }
      .mcs-compare-value { font-size: 13px; text-align: right; font-variant-numeric: tabular-nums; }
      .mcs-citations {
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid var(--card-border);
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .mcs-citation {
        font-size: 12px;
        color: var(--muted);
        text-decoration: none;
      }
      .mcs-citation:hover { text-decoration: underline; }
      .mcs-actions {
        margin-top: 12px;
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }
      .mcs-btn {
        font: inherit;
        padding: 6px 12px;
        border: 1px solid var(--card-border);
        background: var(--card-bg);
        color: var(--fg);
        border-radius: 4px;
        cursor: pointer;
      }
      .mcs-btn:hover { background: var(--hover); }
      .mcs-btn.primary {
        background: var(--accent);
        color: var(--accent-fg);
        border-color: var(--accent);
      }

      /* ---------- Markdown rendering ---------- */
      .mcs-md { line-height: 1.6; font-size: 14px; }
      .mcs-md > *:first-child { margin-top: 0; }
      .mcs-md > *:last-child { margin-bottom: 0; }      .mcs-md p { margin: 0.6em 0; }
      .mcs-md h1, .mcs-md h2, .mcs-md h3, .mcs-md h4 {
        margin: 1.1em 0 0.5em;
        line-height: 1.25;
        font-weight: 600;
      }
      .mcs-md h1 { font-size: 22px; }
      .mcs-md h2 { font-size: 18px; border-bottom: 1px solid var(--card-border); padding-bottom: 4px; }
      .mcs-md h3 { font-size: 16px; }
      .mcs-md h4 { font-size: 14px; color: var(--muted); }
      .mcs-md ul, .mcs-md ol { padding-left: 22px; margin: 0.5em 0; }
      .mcs-md li { margin: 0.25em 0; }
      .mcs-md a { color: var(--accent); text-decoration: none; }
      .mcs-md a:hover { text-decoration: underline; }
      .mcs-md code {
        font-family: ui-monospace, Consolas, monospace;
        font-size: 0.9em;
        background: var(--hover);
        padding: 1px 5px;
        border-radius: 3px;
      }
      .mcs-md pre {
        background: var(--hover);
        padding: 10px 12px;
        border-radius: 6px;
        overflow-x: auto;
      }
      .mcs-md pre code { background: none; padding: 0; }
      .mcs-md blockquote {
        margin: 0.5em 0;
        padding: 4px 12px;
        border-left: 3px solid var(--accent);
        color: var(--muted);
        background: var(--hover);
        border-radius: 0 4px 4px 0;
      }
      .mcs-md table {
        border-collapse: collapse;
        margin: 0.7em 0;
        font-size: 13px;
        max-width: 100%;
      }
      .mcs-md table th,
      .mcs-md table td {
        border: 1px solid var(--card-border);
        padding: 6px 10px;
        text-align: left;
        vertical-align: top;
      }
      .mcs-md table th {
        background: var(--hover);
        font-weight: 600;
      }
      .mcs-md hr {
        border: 0;
        border-top: 1px solid var(--card-border);
        margin: 1em 0;
      }
      .mcs-md img {
        max-width: 100%;
        border-radius: 6px;
      }

      /* ---------- Adaptive Cards integration ---------- */
      .mcs-ac { font-size: 14px; }
      .mcs-ac .ac-image { border-radius: 6px; }
      .mcs-ac .ac-pushButton {
        background: var(--accent) !important;
        color: var(--accent-fg) !important;
        border-color: var(--accent) !important;
      }

      /* ---------- Inline preview clip (small chat card) ----------
         The default inline card shows the FULL reply, which is too tall
         for long answers — user has to scroll the iframe AND M365 Copilot
         to reach the Open button. We cap the inline body at ~280 px with
         a soft fade-out, and rely on the Open button to switch to
         fullscreen for the full reading experience. v0.7.2d. */
      [data-display='inline'] .mcs-preview-clip {
        max-height: 280px;
        overflow: hidden;
        position: relative;
      }
      [data-display='inline'] .mcs-preview-clip::after {
        content: '';
        position: absolute;
        left: 0; right: 0; bottom: 0;
        height: 80px;
        background: linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0) 0%,
          var(--card-bg) 100%
        );
        pointer-events: none;
      }
      [data-theme='dark'] [data-display='inline'] .mcs-preview-clip::after {
        background: linear-gradient(
          to bottom,
          rgba(43, 43, 43, 0) 0%,
          var(--card-bg) 100%
        );
      }
      [data-display='inline'] .mcs-preview-meta {
        font-size: 11px;
        color: var(--muted);
        margin-top: 6px;
      }
      [data-display='fullscreen'] .mcs-preview-clip {
        max-height: none;
        overflow: visible;
      }

      /* ---------- Fullscreen analyst canvas ---------- */
      [data-display='fullscreen'] body { background: var(--bg); }
      [data-display='fullscreen'] .mcs-card {
        max-width: 980px;
        margin: 0 auto;
        padding: 24px 32px 64px;
        border: 0;
        border-radius: 0;
        background: transparent;
      }
      [data-display='fullscreen'] .mcs-md { font-size: 15px; }
      [data-display='fullscreen'] .mcs-md h1 { font-size: 26px; }
      [data-display='fullscreen'] .mcs-md h2 { font-size: 20px; }

      .mcs-canvas-header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 0;
        margin-bottom: 16px;
        border-bottom: 1px solid var(--card-border);
        position: sticky;
        top: 0;
        background: var(--bg);
        z-index: 5;
      }
      .mcs-avatar {
        width: 36px; height: 36px;
        border-radius: 50%;
        background: var(--accent);
        color: var(--accent-fg);
        display: flex; align-items: center; justify-content: center;
        font-weight: 700;
        flex-shrink: 0;
      }
      .mcs-canvas-title { font-size: 16px; font-weight: 600; flex-grow: 1; }
      .mcs-chip {
        font-size: 11px;
        color: var(--muted);
        background: var(--hover);
        padding: 2px 8px;
        border-radius: 12px;
        font-variant-numeric: tabular-nums;
        font-family: ui-monospace, Consolas, monospace;
      }
      .mcs-canvas-toolbar {
        display: flex;
        gap: 8px;
      }

      /* ---------- Print: clean single-column document ---------- */
      @media print {
        :root {
          --bg: #ffffff;
          --fg: #000000;
          --muted: #444;
          --card-bg: #ffffff;
          --card-border: #cccccc;
          --accent: #003399;
        }
        .mcs-canvas-header,
        .mcs-actions,
        .mcs-banner,
        .mcs-toolbar { display: none !important; }
        .mcs-card { padding: 0 !important; }
        a { color: var(--accent); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="mcs-pending">Loading…</div>
    </div>
    <script type="module" src="/src/widget-v2/main.tsx"></script>
  </body>
</html>
